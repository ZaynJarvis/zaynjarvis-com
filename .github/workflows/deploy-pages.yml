name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - run: node scripts/deploy-cloudflare-pages.mjs
        env:
          CF_ACCOUNT_ID: c27c3d9e70c028c8076add760bc0a638
          CF_PAGES_PROJECT: zaynjarvis-com
          CF_MCP_CLIENT_INFO_JSON: ${{ secrets.CF_MCP_CLIENT_INFO_JSON }}
          CF_MCP_TOKENS_JSON: ${{ secrets.CF_MCP_TOKENS_JSON }}
